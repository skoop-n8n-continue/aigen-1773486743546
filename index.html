<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lumina Mall | Interactive Wayfinding</title>
    <link rel="stylesheet" href="styles.css?v=L8M2N5">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons for modern UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <img src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/n8n-continue%2Faigen-1773486743546%2Fassets%2Flumina_mall_logo-1773487777267.png" alt="Lumina Mall Logo" class="logo">
                <div class="mall-info">
                    <h1>Lumina Mall</h1>
                    <p>Grand Avenue, Level 1</p>
                </div>
            </header>

            <div class="search-container">
                <div class="search-input-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="store-search" placeholder="Search stores, food, services...">
                </div>
            </div>

            <nav class="categories">
                <button class="category-btn active" data-category="all">
                    <i data-lucide="layout-grid"></i> All
                </button>
                <button class="category-btn" data-category="Fashion">
                    <i data-lucide="shirt"></i> Fashion
                </button>
                <button class="category-btn" data-category="Food & Dining">
                    <i data-lucide="utensils"></i> Dining
                </button>
                <button class="category-btn" data-category="Electronics">
                    <i data-lucide="smartphone"></i> Tech
                </button>
                <button class="category-btn" data-category="Beauty & Wellness">
                    <i data-lucide="sparkles"></i> Beauty
                </button>
                <button class="category-btn" data-category="Entertainment">
                    <i data-lucide="clapperboard"></i> Fun
                </button>
            </nav>

            <div class="store-list-container">
                <ul id="store-list" class="store-list">
                    <!-- Stores will be populated here -->
                </ul>
            </div>

            <div class="kiosk-status">
                <div class="status-item">
                    <i data-lucide="map-pin"></i>
                    <span>Kiosk #104 (Level 1)</span>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-area">
            <div class="map-controls">
                <button id="zoom-in" title="Zoom In"><i data-lucide="zoom-in"></i></button>
                <button id="zoom-out" title="Zoom Out"><i data-lucide="zoom-out"></i></button>
                <button id="reset-map" title="Reset View"><i data-lucide="refresh-cw"></i></button>
            </div>

            <div class="map-wrapper" id="map-wrapper">
                <svg id="mall-map" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                    <!-- Map background -->
                    <rect class="map-bg" x="0" y="0" width="800" height="600" />
                    <!-- Map Hallways -->
                    <path class="hallway" d="M 80,80 L 720,80 L 720,520 L 80,520 Z" fill="none" />
                    <rect class="hallway" x="80" y="80" width="640" height="440" fill="#f0f4f8" rx="10" />
                    <rect class="courtyard" x="250" y="200" width="300" height="200" fill="#e2e8f0" rx="40" />

                    <!-- Store containers will be populated here -->
                    <g id="stores-layer"></g>

                    <!-- Wayfinding Path layer -->
                    <path id="wayfinding-path" d="" fill="none" stroke="#00b7af" stroke-width="4" stroke-dasharray="8,4" />

                    <!-- You Are Here Marker -->
                    <g id="user-location" transform="translate(400, 500)">
                        <circle r="12" fill="#00b7af" opacity="0.3">
                            <animate attributeName="r" values="10;15;10" dur="2s" repeatCount="indefinite" />
                        </circle>
                        <circle r="6" fill="#00b7af" />
                        <text y="-25" text-anchor="middle" font-weight="bold" font-size="14" fill="#10181f">You Are Here</text>
                    </g>
                </svg>
            </div>

            <!-- Store Details Panel (Overlay) -->
            <div id="store-details" class="store-details hidden">
                <button class="close-details"><i data-lucide="x"></i></button>
                <div class="details-content">
                    <div class="details-header">
                        <span class="category-badge" id="detail-category">Fashion</span>
                        <h2 id="detail-name">Store Name</h2>
                    </div>
                    <p id="detail-description">Description of the store goes here.</p>
                    <div class="details-meta">
                        <div class="meta-item">
                            <i data-lucide="clock"></i>
                            <span id="detail-hours">10:00 AM - 9:00 PM</span>
                        </div>
                        <div class="meta-item">
                            <i data-lucide="info"></i>
                            <span>Level 1</span>
                        </div>
                    </div>
                    <div class="details-actions">
                        <button class="btn-primary" id="get-directions">
                            <i data-lucide="navigation"></i> Show Route
                        </button>
                        <div class="mobile-handoff">
                            <div id="qrcode" class="qr-code">
                                <!-- QR code placeholder -->
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=https://example.com/mall/s1" alt="QR Code">
                            </div>
                            <p>Take route to your phone</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js?v=L8M2N5"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
